name: Build Egern Rules
on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Prepare Directories
        run: |
          mkdir -p Egern/Rule
          mkdir -p tmp
      - name: Download and Convert Rules
        run: |
          # 配置单条规则：直接写链接
          # 配置合并规则：组名
          RULE_SOURCES="
https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/YouTube.list
https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Twitter.list
https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Google.list
https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/TikTok.list
https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Telegram.list
https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Spotify.list
BanAD
- https://anti-ad.net/surge.txt
- https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge-RULE-SET.list
          "

          echo "开始处理规则..."
          CURRENT_MERGE_GROUP=""
          while IFS= read -r line; do
            line_trimmed=$(echo "$line" | xargs)
            if [[ -z "$line_trimmed" || "$line_trimmed" == "#"* ]]; then
              continue
            fi

            if [[ ! "$line_trimmed" =~ ^https?:// ]] && [[ ! "$line_trimmed" =~ ^- ]]; then
              CURRENT_MERGE_GROUP="$line_trimmed"
              > "tmp/$CURRENT_MERGE_GROUP.merged"
              continue
            fi

            if [[ "$line_trimmed" =~ ^- ]]; then
              url="${line_trimmed:1}"
              url_clean=$(echo "$url" | xargs)
              curl -sL -f "$url_clean" >> "tmp/$CURRENT_MERGE_GROUP.merged" && echo "" >> "tmp/$CURRENT_MERGE_GROUP.merged" || echo "下载失败: $url_clean"
              continue
            fi

            filename=$(basename "$line_trimmed" .list)
            curl -sL -f "$line_trimmed" -o "tmp/$filename.list" || echo "下载失败: $line_trimmed"
          done <<< "$RULE_SOURCES"

          for merged_file in tmp/*.merged; do
            [ -e "$merged_file" ] || continue
            base_name=$(basename "$merged_file" .merged)
            sort -u "$merged_file" | grep -v '^$' > "tmp/$base_name.list"
          done

          echo "开始转换规则..."
          for list_file in tmp/*.list; do
            [ -e "$list_file" ] || break
            base_name=$(basename "$list_file" .list)
            output_file="Egern/Rule/$base_name.yaml"

            grep -E '^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-WILDCARD|IP-CIDR|IP-CIDR6|IP-ASN|URL-REGEX|DEST-PORT|GEOIP),' "$list_file" | sed 's/,no-resolve$//' > tmp/current_work.tmp

            no_resolve_flag="false"
            if grep -qE '^(IP-(ASN|CIDR|CIDR6)),.*,no-resolve$' "$list_file"; then
              no_resolve_flag="true"
            fi

            echo "# 规则名称: $base_name" > "$output_file"
            echo "# 规则统计: 0" >> "$output_file"
            echo "" >> "$output_file"

            if [ "$no_resolve_flag" = "true" ]; then
              echo "no_resolve: true" >> "$output_file"
              echo "" >> "$output_file"
            fi

            declare -A RULE_MAP=(
              ["DOMAIN"]="domain_set"
              ["DOMAIN-SUFFIX"]="domain_suffix_set"
              ["DOMAIN-KEYWORD"]="domain_keyword_set"
              ["DOMAIN-WILDCARD"]="domain_wildcard_set"
              ["IP-CIDR"]="ip_cidr_set"
              ["IP-CIDR6"]="ip_cidr6_set"
              ["IP-ASN"]="asn_set"
              ["URL-REGEX"]="url_regex_set"
              ["DEST-PORT"]="dest_port_set"
              ["GEOIP"]="geoip_set"
            )

            for rule_type in "${!RULE_MAP[@]}"; do
              egern_type="${RULE_MAP[$rule_type]}"
              grep "^$rule_type," tmp/current_work.tmp | \
              awk -F',' -v rule_type="$rule_type" '{
                value=$2;
                if (rule_type == "URL-REGEX" || rule_type == "DOMAIN-WILDCARD") {
                  value="\"" value "\""
                }
                print value
              }' | sort -u > tmp/values.tmp

              if [ -s tmp/values.tmp ]; then
                echo "$egern_type:" >> "$output_file"
                sed 's/^/  - /' tmp/values.tmp >> "$output_file"
                echo "" >> "$output_file"
              fi
            done

            total_rules=$(grep -c '^  - ' "$output_file" 2>/dev/null || echo 0)
            sed -i "2s/# 规则统计: 0/# 规则统计: $total_rules/" "$output_file"
          done

      - name: Commit Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Egern/
          if git diff --cached --quiet; then
            echo "无变更"
          else
            git commit -m "Auto Update: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
          fi