name: Build Egern Rules

on:
  workflow_dispatch:
  schedule:
    - cron: '30 0 * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Shanghai
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Prepare Environment
        run: |
          mkdir -p Rule
          mkdir -p tmp

      - name: Configure Rules & Download
        run: |
          declare -A SINGLE_RULES=(
            ["YouTube"]="https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/YouTube.list"
            ["Twitter"]="https://raw.githubusercontent.com/ACL4SSR/ACL4SSR/refs/heads/master/Clash/Ruleset/Twitter.list"
          )
          declare -A MERGE_RULES=(
            ["BanAD"]="https://anti-ad.net/surge.txt
                        https://raw.githubusercontent.com/TG-Twilight/AWAvenue-Ads-Rule/main/Filters/AWAvenue-Ads-Rule-Surge-RULE-SET.list"
          )

          for key in "${!SINGLE_RULES[@]}"; do
            output_name="$key"
            source_url="${SINGLE_RULES[$key]}"
            echo "  [Single] $output_name.yaml <- $source_url"
            curl -sL -f "$source_url" -o "tmp/$output_name.list" || echo "Download failed: $source_url"
          done

          for key in "${!MERGE_RULES[@]}"; do
            output_name="$key"
            urls="${MERGE_RULES[$key]}"
            echo "  [Merge] $output_name.yaml <- $urls"
            temp_file="tmp/$output_name.merged"
            > "$temp_file"
            for url in $urls; do
              curl -sL -f "$url" >> "$temp_file" && echo "" >> "$temp_file" || echo "    Download failed: $url"
            done
            sort -u "$temp_file" | grep -v '^$' > "tmp/$output_name.list"
          done

      - name: Convert to Egern Format
        run: |
          for list_file in tmp/*.list; do
            [ -e "$list_file" ] || { echo "No list files found."; break; }
            
            base_name=$(basename "$list_file" .list)
            output_file="Egern/Rule/$base_name.yaml"
            echo "Converting: $base_name"

            grep -E '^(DOMAIN|DOMAIN-SUFFIX|DOMAIN-KEYWORD|DOMAIN-WILDCARD|IP-CIDR|IP-CIDR6|IP-ASN|URL-REGEX|DEST-PORT|GEOIP),' "$list_file" | sed 's/,no-resolve$//' > tmp/current_work.tmp

            no_resolve_flag="false"
            if grep -qE '^(IP-(ASN|CIDR|CIDR6)),.*,no-resolve$' "$list_file"; then
              no_resolve_flag="true"
            fi

            echo "# 规则名称: $base_name" > "$output_file"
            echo "# 规则统计: 0" >> "$output_file"
            echo "" >> "$output_file"

            if [ "$no_resolve_flag" = "true" ]; then
              echo "no_resolve: true" >> "$output_file"
              echo "" >> "$output_file"
            fi

            declare -A RULE_MAP=(
              ["DOMAIN"]="domain_set"
              ["DOMAIN-SUFFIX"]="domain_suffix_set"
              ["DOMAIN-KEYWORD"]="domain_keyword_set"
              ["DOMAIN-WILDCARD"]="domain_wildcard_set"
              ["IP-CIDR"]="ip_cidr_set"
              ["IP-CIDR6"]="ip_cidr6_set"
              ["IP-ASN"]="asn_set"
              ["URL-REGEX"]="url_regex_set"
              ["DEST-PORT"]="dest_port_set"
              ["GEOIP"]="geoip_set"
            )

            for rule_type in "${!RULE_MAP[@]}"; do
              egern_type="${RULE_MAP[$rule_type]}"
              
              grep "^$rule_type," tmp/current_work.tmp | \
              awk -F',' -v rule_type="$rule_type" '{ 
                value=$2; 
                if (rule_type == "URL-REGEX" || rule_type == "DOMAIN-WILDCARD") {
                  value="\"" value "\""
                }
                print value 
              }' | sort -u > tmp/values.tmp

              if [ -s tmp/values.tmp ]; then
                echo "$egern_type:" >> "$output_file"
                sed 's/^/  - /' tmp/values.tmp >> "$output_file"
                echo "" >> "$output_file"
              fi
            done

            total_rules=$(grep -c '^  - ' "$output_file" 2>/dev/null || echo 0)
            sed -i "2s/# 规则统计: 0/# 规则统计: $total_rules/" "$output_file"
            
            echo "  Done, total rules: $total_rules"
          done

      - name: Commit Changes
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add Egern/
          if git diff --cached --quiet; then
            echo "No changes detected."
          else
            git commit -m "Auto Update Egern Rules: $(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M')"
            git push
            echo "Rules updated and pushed."
          fi